repos:

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [numpy]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: .venv/Scripts/python.exe -m pytest   # Windows
        language: system
        types: [python]
        pass_filenames: false
        args: [--tb=short, -q, --color=yes, --cov=crowd_evacuation_simulator, --cov-report=term-missing, --cov-fail-under=85]